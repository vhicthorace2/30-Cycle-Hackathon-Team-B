name: Security Scan

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

permissions:
  contents: read
  security-events: write
  statuses: write

jobs:
  # Scan dependencies for known vulnerabilities
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22.x']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies for vulnerabilities
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Run pnpm audit with JSON output
        run: pnpm audit --json > audit-report.json
        continue-on-error: true

      - name: Generate SBOM (Software Bill of Materials)
        run: pnpm list --depth 0 > sbom.txt
        continue-on-error: true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-report
          path: audit-report.json
          retention-days: 30

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom
          path: sbom.txt
          retention-days: 30

      - name: Parse and display audit results
        if: always()
        run: |
          if (Test-Path "audit-report.json") {
            Write-Host "📋 Dependency Audit Report Generated"
            $report = Get-Content audit-report.json | ConvertFrom-Json
            $vulnerabilities = $report.metadata.vulnerabilities
            Write-Host "Total vulnerabilities: $($vulnerabilities.total)"
            Write-Host "Critical: $($vulnerabilities.critical)"
            Write-Host "High: $($vulnerabilities.high)"
            Write-Host "Medium: $($vulnerabilities.medium)"
            Write-Host "Low: $($vulnerabilities.low)"
          }
        shell: pwsh
        continue-on-error: true

  # CodeQL code scanning for security issues
  codeql-scan:
    name: CodeQL Code Scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm run build
        continue-on-error: true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:javascript-typescript'

  # Trivy filesystem scanning
  trivy-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

  # OWASP Dependency-Check for comprehensive vulnerability scanning
  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'test-api'
          path: '.'
          format: 'SARIF'
          args: >
            --enableExperimental

      - name: Upload OWASP Dependency-Check results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'dependency-check-report.sarif'
          category: 'dependency-check'
        continue-on-error: true

  # Semgrep static analysis
  semgrep-scan:
    name: Semgrep Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Semgrep scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/typescript
            p/nodejs
            p/owasp-top-ten
            p/security-audit
          json: false
          sarif: true
        continue-on-error: true

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'semgrep.sarif'
          category: 'semgrep'
        continue-on-error: true

  # npm outdated packages scan
  outdated-packages:
    name: Outdated Packages Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for outdated packages
        run: pnpm outdated > outdated-packages.txt
        continue-on-error: true

      - name: Upload outdated packages report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: outdated-packages
          path: outdated-packages.txt
          retention-days: 30

  # License scanning
  license-scan:
    name: License Compliance Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install license-checker
        run: npm install -g license-checker-rseidelsohn

      - name: Run license check
        run: license-checker --json > license-report.json
        continue-on-error: true

      - name: Upload license report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: license-report
          path: license-report.json
          retention-days: 30

      - name: Check for problematic licenses
        run: |
          $report = Get-Content license-report.json | ConvertFrom-Json
          $problemLicenses = @("GPL", "AGPL", "SSPL")
          $found = $false
          foreach ($license in $problemLicenses) {
            $matching = $report.PSObject.Properties | Where-Object { $_.Value -like "*$license*" }
            if ($matching) {
              Write-Host "⚠️ Found $license license(s):"
              foreach ($item in $matching) {
                Write-Host "  - $($item.Name): $($item.Value)"
              }
              $found = $true
            }
          }
          if ($found) {
            Write-Host "Review licenses for compliance requirements"
          }
        shell: pwsh
        continue-on-error: true

  # Repository security features check
  repo-security-check:
    name: Repository Security Features Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for security best practices
        run: |
          Write-Host "🔒 Repository Security Checklist"
          Write-Host ""
          
          # Check for SECURITY.md
          if (Test-Path "SECURITY.md") {
            Write-Host "✓ SECURITY.md found"
          } else {
            Write-Host "✗ SECURITY.md not found"
          }
          
          # Check for .gitignore
          if (Test-Path ".gitignore") {
            Write-Host "✓ .gitignore found"
          } else {
            Write-Host "✗ .gitignore not found"
          }
          
          # Check for .env.example
          if (Test-Path ".env.example") {
            Write-Host "✓ .env.example found"
          } else {
            Write-Host "✗ .env.example not found"
          }
          
          # Check for dependabot configuration
          if (Test-Path ".github/dependabot.yml") {
            Write-Host "✓ Dependabot configuration found"
          } else {
            Write-Host "✗ Dependabot configuration not found"
          }
          
          # Check for .npmrc or pnpm config
          if ((Test-Path ".npmrc") -or (Test-Path ".pnpmrc")) {
            Write-Host "✓ npm/pnpm configuration found"
          } else {
            Write-Host "ℹ️ npm/pnpm configuration not found"
          }
          
          Write-Host ""
          Write-Host "Review and implement recommended security practices"
        shell: pwsh

  # Report summary
  security-report:
    name: Security Report Summary
    runs-on: ubuntu-latest
    needs: [dependency-scan, dependency-check, codeql-scan, trivy-scan, semgrep-scan, outdated-packages, license-scan, repo-security-check]
    if: always()

    steps:
      - name: Check security scan results
        run: |
          Write-Host "🔐 Security Scan Complete"
          Write-Host ""
          Write-Host "Scanned components:"
          Write-Host "✓ pnpm audit - npm package vulnerabilities"
          Write-Host "✓ OWASP Dependency-Check - comprehensive dependency analysis"
          Write-Host "✓ CodeQL - static code analysis for security flaws"
          Write-Host "✓ Trivy - filesystem and configuration vulnerabilities"
          Write-Host "✓ Semgrep - semantic code analysis and patterns"
          Write-Host "✓ Outdated Packages - identifies stale dependencies"
          Write-Host "✓ License Scan - checks for license compliance"
          Write-Host "✓ Repository Security - best practices checklist"
          Write-Host ""
          Write-Host "📊 View detailed results in the Security tab"
          Write-Host "📦 Check Actions artifacts for detailed reports"
        shell: pwsh

      - name: Fail if critical issues found
        if: failure()
        run: |
          Write-Host "::error::Security scans detected issues. Please review the Security tab for details."
          exit 1
        shell: pwsh
